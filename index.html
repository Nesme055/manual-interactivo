<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Interactivo Pro</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style>
:root {
    --bg-color: #1a1d23;
    --accent-color: #4a90e2;
}

body {
    margin: 0;
    background-color: var(--bg-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* BOTÓN */
.top-controls {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
}

.btn-download {
    background: var(--accent-color);
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;
    font-size: clamp(12px, 2vw, 14px);
}

/* CONTENEDOR */
.main-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* LIBRO */
#album {
    max-width: 100%;
    max-height: 100%;
}

#album .page {
    background: white;
}

canvas {
    width: 100% !important;
    height: 100% !important;
}

/* LOADER */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-color);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 2000;
}

/* MÓVIL */
@media (max-width: 768px) {
    .btn-download {
        padding: 6px 10px;
        font-size: 12px;
    }
}
</style>
</head>

<body>

<div id="loader" class="loading-overlay">Cargando experiencia...</div>

<div class="top-controls">
    <a href="L3.pdf" class="btn-download" download>📥 Descargar</a>
</div>

<div class="main-container">
    <div id="album"></div>
</div>

<script>
const PDF_URL = "L3.pdf";
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

let pdfDoc = null;

async function cargarLibro() {
    try {
        pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
        const totalPages = pdfDoc.numPages;

        for (let i = 1; i <= totalPages; i++) {
            const page = await pdfDoc.getPage(i);

            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

            const div = $('<div class="page"></div>').append(canvas);
            $('#album').append(div);
        }

        inicializarFlipbook();

        $('#loader').fadeOut();

    } catch (err) {
        console.error(err);
        $('#loader').text("Error al cargar el PDF");
    }
}

/* 🔥 RESPONSIVE REAL */
function inicializarFlipbook() {

    const isMobile = window.innerWidth < 768;

    const containerWidth = window.innerWidth;
    const containerHeight = window.innerHeight;

    let width, height;

    if (isMobile) {
        width = containerWidth * 0.95;
        height = containerHeight * 0.75;
    } else {
        height = containerHeight * 0.85;
        width = height * 1.8;
    }

    $('#album').turn({
        width: width,
        height: height,
        autoCenter: true,
        display: isMobile ? 'single' : 'double',
        gradients: true,
        elevation: 50
    });

    /* CLICK / TOUCH */
    $('#album').on('click touchstart', function(e) {
        const x = e.originalEvent.touches
            ? e.originalEvent.touches[0].pageX
            : e.pageX;

        const offset = $(this).offset().left;
        const mitad = $(this).width() / 2;

        if (x - offset > mitad) {
            $(this).turn('next');
        } else {
            $(this).turn('previous');
        }
    });
}

/* 🔄 REDIMENSIONAR SIN RECARGAR */
window.addEventListener('resize', () => {
    if ($('#album').data('turn')) {
        $('#album').turn('destroy');
        $('#album').html('');
        cargarLibro();
    }
});

$(document).ready(cargarLibro);
</script>

</body>
</html>
