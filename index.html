<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manual Interactivo Pro</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1d23;
            --accent-color: #4a90e2;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation; /* Optimiza toques en móvil */
        }

        .top-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
        }

        .btn-download {
            background: var(--accent-color);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        #album { 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            cursor: pointer; /* Indica que se puede hacer clic */
        }

        #album .page { background-color: white; }
        canvas { width: 100% !important; height: 100% !important; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">Cargando experiencia interactiva...</div>

    <div class="top-controls">
        <a href="L2.pdf" class="btn-download" download>📥 Descargar PDF</a>
    </div>

    <div class="main-container">
        <div id="album"></div>
    </div>

    <script>
        const PDF_URL = "L2.pdf";
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function cargarLibro() {
            try {
                const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
                const totalPages = pdf.numPages;
                const isMobile = window.innerWidth <= 768;

                // 1. Renderizar páginas
                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2 });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    const pageDiv = $('<div class="page"></div>').append(canvas);
                    $('#album').append(pageDiv);
                }

                // 2. Calcular dimensiones responsivas
                const firstPage = await pdf.getPage(1);
                const aspect = firstPage.getViewport({scale: 1}).width / firstPage.getViewport({scale: 1}).height;
                
                let bookW, bookH;
                if (isMobile) {
                    bookW = window.innerWidth * 0.85;
                    bookH = bookW / aspect;
                } else {
                    bookH = window.innerHeight * 0.8;
                    bookW = (bookH * aspect) * 2;
                }

                // 3. Inicializar Turn.js
                $('#album').fadeIn().turn({
                    width: bookW,
                    height: bookH,
                    autoCenter: true,
                    display: isMobile ? 'single' : 'double',
                    gradients: true,
                    acceleration: true,
                    elevation: 50
                });

                // 4. LÓGICA DE CLIC EN CUALQUIER PARTE
                $('#album').on('click', function(e) {
                    const offset = $(this).offset();
                    const relativeX = e.pageX - offset.left;
                    const bookWidth = $(this).width();

                    // Si hace clic en la mitad derecha, siguiente; si es en la izquierda, anterior
                    if (relativeX > bookWidth / 2) {
                        $(this).turn('next');
                    } else {
                        $(this).turn('previous');
                    }
                });

                $('#loader').fadeOut();

            } catch (error) {
                console.error(error);
                $('#loader').text("Error al cargar el archivo L2.pdf");
            }
        }

        $(document).ready(cargarLibro);

        // Ajustar al girar el celular
        window.addEventListener('resize', () => {
            setTimeout(() => location.reload(), 100);
        });
    </script>
</body>
</html>
