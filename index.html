<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manual Interactivo Multiplataforma</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1d23;
            --sidebar-color: #252932;
            --accent-color: #4a90e2;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- CONTROLES SUPERIORES --- */
        .top-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn-download {
            background: var(--accent-color);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        #album { box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #album .page { background-color: white; line-height: 0; }
        canvas { width: 100% !important; height: 100% !important; }

        /* --- SIDEBAR (Se oculta en celulares pequeños) --- */
        .sidebar {
            width: 200px;
            background-color: var(--sidebar-color);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* Ocultar sidebar en móvil para ganar espacio */
            .top-controls { right: auto; left: 10px; }
        }

        .sidebar-header { color: white; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        .thumb { width: 100%; margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; border-radius: 4px; overflow: hidden; }
        .thumb:hover { border-color: var(--accent-color); }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">Procesando Manual...</div>

    <div class="top-controls">
        <a href="L2.pdf" class="btn-download" download>📥 PDF</a>
    </div>

    <div class="main-container">
        <div id="album"></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">Páginas</div>
        <div id="thumbs-container"></div>
    </div>

    <script>
        const PDF_URL = "L2.pdf";
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function cargarLibro() {
            try {
                const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
                const totalPages = pdf.numPages;

                // Detectar si es móvil
                const isMobile = window.innerWidth <= 768;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2 }); // Mayor escala para nitidez

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    const pageDiv = $('<div class="page"></div>').append(canvas);
                    $('#album').append(pageDiv);

                    // Crear miniatura (solo si no es móvil)
                    if (!isMobile) {
                        const thumbCanvas = document.createElement('canvas');
                        const thumbContext = thumbCanvas.getContext('2d');
                        const thumbVp = page.getViewport({ scale: 0.3 });
                        thumbCanvas.height = thumbVp.height;
                        thumbCanvas.width = thumbVp.width;
                        await page.render({ canvasContext: thumbContext, viewport: thumbVp }).promise;
                        const thumbDiv = $('<div class="thumb"></div>').append(thumbCanvas);
                        thumbDiv.on('click', () => $('#album').turn('page', i));
                        $('#thumbs-container').append(thumbDiv);
                    }
                }

                // CALCULAR TAMAÑO RESPONSIVO
                const firstPage = await pdf.getPage(1);
                const aspect = firstPage.getViewport({scale: 1}).width / firstPage.getViewport({scale: 1}).height;
                
                let bookW, bookH;

                if (isMobile) {
                    // En móvil: Una sola página que ocupe casi todo el ancho
                    bookW = window.innerWidth * 0.9;
                    bookH = bookW / aspect;
                    if (bookH > window.innerHeight * 0.8) {
                        bookH = window.innerHeight * 0.8;
                        bookW = bookH * aspect;
                    }
                } else {
                    // En PC: Dos páginas
                    bookH = window.innerHeight * 0.8;
                    bookW = (bookH * aspect) * 2;
                }

                $('#album').fadeIn().turn({
                    width: bookW,
                    height: bookH,
                    autoCenter: true,
                    display: isMobile ? 'single' : 'double', // CLAVE: Una página en móvil, dos en PC
                    gradients: true,
                    acceleration: true
                });

                $('#loader').fadeOut();

            } catch (error) {
                console.error("Error:", error);
                $('#loader').text("Error cargando el PDF.");
            }
        }

        $(document).ready(cargarLibro);

        // Recargar si cambia la orientación (opcional)
        window.addEventListener('orientationchange', () => location.reload());
    </script>
</body>
</html>
